<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Package Details | Enfolded Media</title>
    <link rel="stylesheet" href="/css/unified.css">
    <script src="https://js.stripe.com/v3/"></script>
    <script>
        // Get environment variables from Cloudflare
        const STRIPE_PUBLISHABLE_KEY = 'pk_live_51O2v6vEj0Ym5N4jVIFhC9lO8BhUZvjWE7qE5y8HBpEXyNaFZ2wsUzTEulLJb0oiHgGEdSj9dTSbCTIU9dW6HuX3800XQHKFzzF';
        const API_URL = window.location.origin; // This will work both locally and in production
    </script>
</head>
<body>
    <style>
        /* Debug panel styling */
        #debug { 
            padding: 20px; 
            font-family: monospace; 
            background: #f8f9fa; 
            border-bottom: 1px solid #dee2e6;
            position: sticky;
            top: 0;
            z-index: 100;
            max-height: 200px;
            overflow-y: auto;
        }
        #debug .info { color: #0c5460; }
        #debug .error { color: #721c24; }
        #debug .success { color: #155724; }
        #debug:empty { display: none; }

        /* Package details styling */
        .package-details {
            max-width: 800px;
            margin: 40px auto;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
        }

        .package-title {
            font-size: 2.5em;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .package-description {
            font-size: 1.2em;
            line-height: 1.6;
            color: #34495e;
            margin-bottom: 30px;
        }

        .package-price {
            font-size: 2.5em;
            color: #27ae60;
            margin: 30px 0;
            font-weight: bold;
        }

        .features-section {
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .features-title {
            font-size: 1.5em;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .features-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .features-list li {
            padding: 10px 0;
            color: #34495e;
            font-size: 1.1em;
        }

        .features-list li:before {
            content: "✓";
            color: #27ae60;
            margin-right: 10px;
        }

        .buy-button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
            margin: 30px 0;
        }

        .buy-button:hover {
            background: #219a52;
        }

        .buy-button:disabled {
            background: #93c7ac;
            cursor: not-allowed;
        }

        .debug-data {
            margin-top: 40px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            text-align: left;
            font-size: 0.9em;
            color: #2c3e50;
            border: 1px solid #dee2e6;
        }
    </style>
    
    <div id="debug"></div>
    <div id="content"></div>

    <script>
        // Enhanced debug helper
        function debug(level, message) {
                const debugDiv = document.getElementById('debug');
                debugDiv.innerHTML += `<div class="${level}">[${level}] ${message}</div>`;
            }

            function displayPackage(pkg) {
                const contentDiv = document.getElementById('content');
                
                const html = `
                    <div class="package-details">
                        <h1 class="package-title">${pkg.name}</h1>
                        <div class="package-description">${pkg.description || ''}</div>
                        
                        <div class="package-price">$${pkg.price || '0.00'}</div>
                        
                        <div class="features-section">
                            <h2 class="features-title">Features</h2>
                            <ul class="features-list">
                                ${(pkg.features || []).map(feature => `<li>${feature}</li>`).join('')}
                            </ul>
                        </div>

                        <button class="buy-button" onclick="handlePurchase('${pkg.id}')">Buy Now</button>

                        <div class="debug-data">
                            <strong>Package Data:</strong>
                            ${JSON.stringify(pkg, null, 2)}
                        </div>
                    </div>
                `;
                
                contentDiv.innerHTML = html;
            }
            
            // Initialize Stripe with the publishable key
            const stripe = Stripe(STRIPE_PUBLISHABLE_KEY);

            async function handlePurchase(packageId) {
                try {
                    debug('info', `Initiating purchase for package: ${packageId}`);
                    
                    // Disable the buy button to prevent double clicks
                    const buyButton = document.querySelector('.buy-button');
                    if (buyButton) {
                        buyButton.disabled = true;
                        buyButton.textContent = 'Processing...';
                    }

                    // Create a checkout session
                    const response = await fetch(`${API_URL}/api/create-checkout-session`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            packageId: packageId
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const session = await response.json();
                    debug('info', 'Redirecting to Stripe checkout...');

                    // Redirect to Stripe Checkout
                    const result = await stripe.redirectToCheckout({
                        sessionId: session.id
                    });

                    if (result.error) {
                        throw new Error(result.error.message);
                    }

                } catch (error) {
                    debug('error', `Purchase failed: ${error.message}`);
                    console.error('Purchase error:', error);
                    
                    // Re-enable the buy button on error
                    const buyButton = document.querySelector('.buy-button');
                    if (buyButton) {
                        buyButton.disabled = false;
                        buyButton.textContent = 'Buy Now';
                    }
                }
            }

            document.addEventListener('DOMContentLoaded', () => {
                debug('info', 'Page ready - will initialize when DOM loads');
                
                // Test data for packages
                const packages = [
                    {
                        id: "event-poster",
                        name: "Event Poster Creator",
                        description: "Create stunning event posters with ease",
                        price: "49.99",
                        features: ["Professional templates", "Custom fonts", "Export in multiple formats"]
                    },
                    {
                        id: "global-pack",
                        name: "Startup Brand Pack",
                        description: "Everything you need to establish your brand identity",
                        price: "299.99",
                        features: ["Logo design", "Business cards", "Social media templates", "Brand guidelines"]
                    },
                    {
                        id: "quick-amendments",
                        name: "Quick Amendments Pack",
                        description: "Fast turnaround for small design changes",
                        price: "29.99",
                        features: ["24-hour turnaround", "2 revisions", "Source files included"]
                    }
                ];

                debug('info', 'Initializing with test data...');
                debug('info', 'Available packages: ' + packages.map(p => p.id).join(', '));

                // Get the package ID from the URL
                const params = new URLSearchParams(window.location.search);
                const packageId = params.get('id');
                debug('info', `Looking for package ID: ${packageId}`);

                if (!packageId) {
                    debug('error', 'No package ID specified in URL');
                    return;
                }

                // Find the package
                const package = packages.find(p => p.id === packageId);
                if (package) {
                    debug('success', `Found package: ${package.name} (${package.id})`);
                    displayPackage(package);
                } else {
                    debug('error', `Package not found: ${packageId}`);
                }
            });
    </script>
</body>
</html>
